<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .bg_box{
            width: 100%;
            height: 700px;
            background-color: lightblue;
            background-image: url(https://www.hyundaixteer.com/resources/img/img_local_network.jpg);
            background-repeat: no-repeat;
            background-size: cover;     
            font-size: 70px;
            color: rgb(255, 255, 255);
            text-align: center;
            line-height: 700px;
        }

        /* *글자 스타일을 부모에게 적용하면 자식이 글자 스타일을 상속받음
        a태그의 색상은 상속이 안됨  */


        /* *배경이미지, 이미지 태그 차이점 
        1.이미지 태그 
        => 이미지 원래 크기 그대로 가져옴 
        => 검색에 노출을 원할때 
        => 웹사이트를 출력할때 이미지가 나오길 원할때 
        => 원본 이미지가 잘리지 않게 표현할때 

        2.배경 이미지 
        => 검색시 노출하기 싫을때 
        => 이미지 출력을 원치 않을때 
        => 잘려도 상관없는 이미지 
        => 배경으로써 이미지를 사용해야될때  */
  
    </style>
</head>
<body>
    
    <div class="bg_box">
        <h1>배경 이미지</h1>
    </div>

</body>
</html>
