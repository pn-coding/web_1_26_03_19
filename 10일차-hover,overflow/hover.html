<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box{
            width: 300px;
            height: 300px;
            background-color: teal;
        }

        /* *hover 
        =>엘리먼트에 마우스를 올리면 값을 변화 할 수 있음 */

        .box:hover{
            background-color: hotpink;
            width: 500px;
        }

        .parent_box{
            width: 500px;
            height: 300px;
            background-color: gray;
        }

        .child_box{
            width: 100px;
            height: 100px;
            background-color: gold;
        }

        /* 부모에 마우스를 올리면 자식의 배경색이 변경 */

        /* .parent_box:hover > .child_box{
            background-color: salmon;
        } */

        /* 부모에 마우스를 올리면 자손의 배경색이 파란색으로 변경 */

        .parent_box:hover .child_box{
            background-color: blue;
        }

    </style>

</head>
<body>
    
    <div class="box"></div>

    <div class="parent_box">
        <div class="child_box"></div>
    </div>

</body>
</html>
