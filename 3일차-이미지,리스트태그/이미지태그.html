<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- *이미지 태그 
    =>브라우저에 이미지를 불러올때 사용 
    =>이미지 태그는는 단독 태그
    =>src: 이미지 경로를 작성함
    =>alt: 이미지의 경로가 상실했을때 대신할 글자, 시각작애인들을 위함, 검색시 노출
    =>width: 이미지 가로 크기 단위는 px
    =>height: 이미지 세로 크기 단위는 px
    =>title: 이미지에 마우스를 올리면 타이틀이 나옴 
    =>border: 이미지의 바깥 부분으로 검은색 테두리가 나옴 단위는 px -->
    
    <img src="bg.webp" alt="고양이" width="500" height="500" title="고양이" border="10">
    <img src="img/bg_2.jfif" alt="고양이 2">

    

</body>
</html>
