<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .box{
            width: 300px;
            height: 500px;
            border-width: 10px;
            border-style: dotted;
            border-color: blue;
            text-align: right;
            line-height: 500px;
            font-size: 60px;
            font-weight: 900;
            font-style: italic;
            text-decoration: underline;
            font-family: '나눔고딕';
        }

    </style>

</head>
<body>
    
    <!-- *문제
    =>클래스를 사용하여 엘리먼트 제작
    =>엘리먼트의 크기 300 * 500
    =>10px 파란색의 점선으로 제작 
    =>글자 좌우: 오른쪽, 상하: 가운데, 크기는 60, 두껍게 
    기울기, 밑줄, 글자체는 나눔고딕 -->

    <div class="box">텍스트</div>


</body>
</html>
