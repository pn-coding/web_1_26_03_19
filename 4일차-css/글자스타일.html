<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .text_box{
            width: 500px;
            height: 300px;
            border-width: 5px;
            border-color: black;
            border-style: solid;

            font-size: 30px;
            /* =>글자 크기 조절 */

            /* font-family: '궁서체'; */
            /* =>글자체 변경, 컴퓨터에 설치된 폰트만 사용 가능 */

            color: green;
            /* 글자 색상 변경, 영문, rgb, rgba, 16진수 사용가능 */

            font-weight: 900;
            /* =>글자 두께 조절 
            100             500             900
            (얇게)         (중간)           (두껍게) */

            text-align: center;
            /* =>글자 좌우 정렬 */

            line-height: 300px;
            /* =>글자 상하 정렬 
            =>행간 조절로 맞추다 보니 오차가 발생 할 수 있음 
            =>선택된 엘리먼트의 높이값을 적용해야됨 */

            /* text-decoration: underline; */
            /* =>글자 밑줄 */

            /* text-decoration: line-through; */
            /* =>글자 취소선 */

            text-decoration: overline;
            /* =>글자 윗줄 */

            font-style: italic;
            /* =>글자 기울기 */
        }

    </style>

</head>
<body>
    
    <div class="text_box">배고파</div>


</body> 
</html>
