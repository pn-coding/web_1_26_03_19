<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스타일시트</title>

    <style>

        /* *css 
        =>Cascade Style Sheet의 약자  
        =>스타일을 적용할때 사용 
        =>html 엘리먼트를 선택하여 원하는 스타일을 적용함
        =>스타일 뿐만 아니라, 반응형까지 작업함 
        =>
        선택자{
            속성: 값;
        }
        속성 작성 끝나면 반드시 세미콜론 (;)을 붙여서 마무리 
        
        
        *선택자 
        1.태그선택자: 태그명을 선택하여 스타일 적용, 같은 태그명은 동일하게 스타일 적용됨

        2.class선택자: 태그에 클래스 속성을 지정하여 사용함 , 같은 클래스 명은 같은 스타일 적용되며, 
        반드시 선택자 앞에 .을 붙여줘야됨        

        3.id선택자: 특정태그 하나만 선택할때 사용, 같은 아이디 명이 있으면 안됨, 
        반드시 선택자 앞에 #을 붙여줘야됨 

        *class, id 선택자명 작성 규칙 
        =>반드시 영어로 작성할것 
        =>대소문자를 구분하지 않으나, 첫글자는 반드시 소문자로 작성
        =>특수문자는 -(하이픈), _(언더바)만 사용 가능 */


        body{
            height: 300vh;
        }
        
        div{
            width: 300px;
            height: 300px;
            border-width: 10px;
            /* =>테두리 두께 */

            border-style: solid;
            /* =>테두리 종류 */

            border-color: darkslategray;
            /* =>테두리 색상 */
        }

        .box_red{
            width: 200px;
            border-color: red;
        }
        
        h2{
            width: 500px;
            height: 100px;
            border-width: 5px;
            border-style: dotted;
            border-color: royalblue;
        }

        #box_3{
            border-style: dashed;
        }

    </style>
</head>
<body>
    
    <div></div>
    <div class="box_red"></div>
    <div class="box_red" id="box_3"></div>
    <h2 class="box_red"></h2>
    

</body>
</html>
