<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ul,li{
            list-style: none;
        }

        .con_wrap{
            width: 1200px;
            height: 400px;
            background-color: gray;
        }

        .con_wrap li{
            width: 386.66666px;
            height: 400px;
            background-color: pink;
            float: left;
            margin-right: 20px;
        }             

        .con_wrap li:last-child{
            margin-right: 0;
        }


    </style>

</head>
<body>
    
    <ul class="con_wrap">
        <li></li>
        <li></li>
        <li></li>
    </ul>

</body>
</html>
