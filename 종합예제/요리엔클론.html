<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a{
            text-decoration: none;
            color: black;
        }

        ul,li{
            list-style: none;
        }

        img{
            width: 100%;
            display: block;
        }

        /* reset end */

        body{
            background-color: black;
        }

        header{
            width: 1800px;
            position: absolute;
            top: 40px;
            left: 50%;
            margin-left: -900px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 30px;
            z-index: 10;
        }

        header a{
            color: white;
        }

        .logo{
            width: 100px;
            float: left;
        }

        .menu_wrap{
            width: 280px;
            height: 20px;
            position: absolute;
            top: 48%;
            left: 50%;
            margin-left: -140px;
            margin-top: -10px;
        }

        .menu_wrap li{
            font-size: 18px;
            float: left;
            margin-right: 60px;
        }

        .menu_wrap li:last-child{
            margin-right: 0;
        }

        .side_menu{
            float: right;
            margin-top: 5px;
        }
        /* header end */


        .section_1{
            height: 980px;
            /* background-image: url(https://yorien.com/data/file/promotion/thumb-9df7d8f6a8ed83e94730c787371ce6aa_vgJZK9MP_2051ed40ba45776dd2645aed7d8cd6b37273936e_1000x500.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center; */

            /* *background 축약
            =>background: 색상 경로 반복 위치 / 크기; */
            background: url(https://yorien.com/data/file/promotion/thumb-9df7d8f6a8ed83e94730c787371ce6aa_vgJZK9MP_2051ed40ba45776dd2645aed7d8cd6b37273936e_1000x500.jpg) no-repeat center / cover;
            position: relative;
        }

        .section_1 h1{
            position: absolute;
            bottom: 140px;
            left: 180px;
            font-size: 50px;
            color: white;
        }

    </style>
</head>
<body>

    <div class="wrap">

        <header>

            <div class="logo">
                <a href="#">
                    <img src="https://yorien.com/img/logo.svg" alt="logo">
                </a>
            </div>

            <ul class="menu_wrap">
                <li><a href="#">About</a></li>
                <li><a href="#">Chablis</a></li>
                <li><a href="#">Shop</a></li>
            </ul>

            <div class="side_menu">
                <a href="#">고객상담센터</a>
            </div>

        </header>
        <!-- header end -->

        <section class="section_1">

            <h1>
                봄을 여는 설렘,<br>
                blossom pink
            </h1>

        </section>

    </div>
    
</body>
</html>
