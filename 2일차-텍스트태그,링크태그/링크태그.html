<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- *경로
    =>절대 경로: 처음부터 끝까지 모든 경로를 나타냄 
    =>상대 경로: 특정 경로에서 시작해서 지정한 경로까지 나타냄  -->

    <!-- *링크태그 
    =>글자를 클릭할때 원하는 페이지로 이동 
    =>속성: href, target이 있음
    =>href: 클릭시 이동하길 원하는 경로 작성 (절대경로로 작성)
    =>target: _blank는 새창으로 링크 이동  -->

    <a href="https://naver.com">네이버로 바로가기</a> <br>
    <a href="https://youtube.com" target="_blank">유튜브로 새창으로 바로가기</a>

</body>
</html>
