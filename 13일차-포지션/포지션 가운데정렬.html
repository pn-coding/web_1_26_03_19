<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .parent_el{
            width: 30%;
            height: 300px;
            background-color: lightgray;
            margin: 0 auto;
            position: relative;
            /* =>자식이 절대값을 적용하게 되면 브라우저 좌측 상단으로 이동 되는데, 
            기준이 브라우저가 아닌 부모 엘리먼트가 되기 위해선 지금처럼 
            부모 엘리먼트에 포지션을 적용하면됨 (상황에 따라 상대,절대값 적용) */
        }

        .child_el{
            width: 100px;
            height: 100px;
            background-color: gold;
            position: absolute;
            top: 50%;
            left: 50%;
            /* margin: 0 auto; */
            /* =>절대값을 사용하게 되면 마진의 auto값은 사용 불가 */
            margin-left: -50px;
            margin-top: -50px;
        }

    </style>

</head>
<body>
    
    <div class="parent_el">
        <div class="child_el"></div>
    </div>

</body>
</html>
